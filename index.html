<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>🍱 Meal Planner</h1>
    <div id="week-label">Week of —</div>
  </header>

  <!-- TAB BAR -->
  <nav class="tabs">
    <button class="tab active" data-tab="this-week">This Week</button>
    <button class="tab" data-tab="grocery">Grocery List</button>
    <button class="tab" data-tab="generate">Generate / AI</button>
  </nav>

  <!-- TAB: THIS WEEK -->
  <div id="this-week" class="tab-panel active">

    <section>
      <h2>Dinners</h2>
      <div id="dinners-list" class="meal-list"></div>
    </section>

    <section>
      <h2>Adult Lunches</h2>
      <div id="lunches-list" class="meal-list"></div>
    </section>

    <section>
      <h2>Margot's Lunches</h2>
      <div id="margot-list" class="meal-list"></div>
    </section>

  </div>

  <!-- TAB: GROCERY LIST -->
  <div id="grocery" class="tab-panel">
    <div class="grocery-actions">
      <button class="btn-secondary" id="uncheck-all">Uncheck All</button>
    </div>
    <div id="grocery-list"></div>
  </div>

  <!-- TAB: GENERATE / AI -->
  <div id="generate" class="tab-panel">
    <div class="generate-card">
      <h2>Generate a New Week</h2>
      <p>This copies your full household prompt to your clipboard. Paste it into <strong>Claude.ai</strong>, copy the JSON it returns, then paste it below.</p>

      <label for="on-hand">Ingredients you have on hand this week <span class="optional">(optional)</span></label>
      <textarea id="on-hand" rows="3" placeholder="e.g. rotisserie chicken, spinach, cherry tomatoes..."></textarea>

      <label for="recent-dinners">Recent dinners to avoid <span class="optional">(optional — app will fill this in automatically over time)</span></label>
      <textarea id="recent-dinners" rows="3" placeholder="e.g. miso salmon, shrimp stir fry..."></textarea>

      <button class="btn-primary" id="copy-prompt">Copy Prompt to Clipboard</button>
      <div id="copy-confirm" class="copy-confirm hidden">✓ Copied! Now paste it into Claude.ai.</div>

      <hr />

      <label for="paste-json">Paste Claude's JSON response here</label>
      <textarea id="paste-json" rows="8" placeholder='Paste the JSON from Claude.ai here...'></textarea>
      <button class="btn-primary" id="load-plan">Load Plan into App</button>
      <div id="load-error" class="error hidden"></div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="modal-title">Edit Meal</h3>

      <label>Meal name</label>
      <input type="text" id="modal-name" />

      <label>Instructions</label>
      <textarea id="modal-instructions" rows="4"></textarea>

      <label>Baby notes (Margot)</label>
      <textarea id="modal-baby" rows="2"></textarea>

      <label>Your notes</label>
      <textarea id="modal-notes" rows="2" placeholder="e.g. double the sauce next time"></textarea>

      <label>Ingredients (one per line, for grocery list)</label>
      <textarea id="modal-ingredients" rows="4" placeholder="salmon fillets&#10;frozen green beans&#10;cherry tomatoes"></textarea>

      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
